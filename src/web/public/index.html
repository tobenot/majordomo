<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>majordomo · 中枢</title>
    <link rel="icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="logo" src="assets/favicon.svg" alt="⌘" />
        <span class="title">majordomo</span>
        <span class="subtitle" id="personaName">中枢</span>
      </div>
      <div class="status">
        <button id="btnPopupRestore" title="恢复弹窗">弹窗</button>
        <span id="connState" class="badge off">未连接</span>
        <span id="engineBadge" class="badge"></span>
      </div>
    </header>

    <main>
      <!-- ① 窗口列表 -->
      <aside id="sidebar">
        <div class="sidebar-head"><span id="sidebarLabel">窗口</span> <span id="winCount" class="count">0</span></div>
        <ul id="windowList"></ul>
        <div class="cg-frame" id="cgFrame">
          <img class="cg-img" id="cgImg" src="" alt="" />
          <div class="cg-empty" id="cgEmpty">16:9 CG<br /><small>assets/cg/{人设名}.webp</small></div>
        </div>
      </aside>

      <!-- 选中窗口：活动流 + 人设复命 -->
      <section id="detail">
        <div id="detailHead" class="detail-head">
          <span id="detailTitle">选一个窗口看它在做什么</span>
          <span id="detailState" class="badge"></span>
        </div>
        <div id="personaBox" class="persona-box">
          <div class="cg-ambient" id="cgAmbient"></div>
          <div class="persona-scroll" id="personaScroll"></div>
          <img class="standing-panel" id="standingPanel" src="" alt="" />
        </div>
        <details id="activityWrap" class="activity-wrap">
          <summary>原始事件 (<span id="actCount">0</span>)</summary>
          <div id="activity" class="activity"></div>
        </details>
      </section>

      <!-- ②③ 全局待办 + 待验收 -->
      <aside id="rail">
        <div class="rail-section">
          <div class="rail-head">
            <span>全局待办 <span id="todoCount" class="count">0</span></span>
          </div>
          <form id="todoForm" class="todo-form">
            <input id="todoInput" type="text" autocomplete="off" placeholder="加一条待办，回车…" />
          </form>
          <ul id="todoList" class="rail-list"></ul>
        </div>
        <div class="rail-section">
          <div class="rail-head"><span>待验收 <span id="accCount" class="count">0</span></span></div>
          <ul id="acceptanceList" class="rail-list"></ul>
        </div>
      </aside>
    </main>

    <script>
      window.__WS_URL__ = "{{WS_URL}}";
    </script>
    <script src="markdown.js"></script>
    <script src="app.js"></script>
  </body>
</html>
