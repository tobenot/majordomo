<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>majordomo</title>
    <link rel="icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="card" class="card collapsed">
      <!-- 头部：拖拽区 + 头像 + 标题 + 未读标签 + 连接 -->
      <header id="head">
        <img class="avatar" id="avatar" src="" alt="" />
        <img class="logo" id="logo" src="assets/favicon.svg" alt="⌘" />
        <span class="proj" id="proj">majordomo</span>
        <span class="more" id="more" style="display:none"></span>
        <span class="spacer"></span>
        <span class="time" id="time"></span>
        <span class="conn" id="conn" title="与中枢的连接"></span>
        <button id="btnMin" class="btn-min" title="缩小弹窗（不再自动弹出）">−</button>
      </header>

      <!-- 列表视图 -->
      <div id="listWrap" class="list-wrap">
        <div id="windowList"></div>
        <!-- 列表态右缘立绘 peek：她探个头 -->
        <img class="standing-peek" id="standingPeek" src="" alt="" />
      </div>

      <!-- 详情视图 -->
      <div id="detailWrap" class="detail-wrap" style="display:none">
        <!-- CG 横幅 16:9 -->
        <div class="cg-banner" id="cgBanner">
          <img class="cg-banner-img" id="cgBannerImg" src="" alt="" />
        </div>

        <!-- persona 全文 -->
        <section class="persona" id="personaWrap">
          <div class="who" id="who">中枢</div>
          <div class="persona-row">
            <img class="standing" id="standing" src="" alt="" />
            <div class="body" id="persona"></div>
          </div>
        </section>

        <!-- 会话度量 -->
        <div class="detail-metrics" id="detailMetrics" style="display:none"></div>

        <!-- 本轮活动 mini 流 -->
        <section class="acts" id="actsWrap">
          <div class="acts-head">本轮活动</div>
          <div id="acts"></div>
        </section>

        <!-- 底部按钮 -->
        <footer>
          <button id="btnList" title="返回列表">←</button>
          <button id="btnOk" class="primary">知道了</button>
          <button id="btnCopy">复制</button>
        </footer>
      </div>
    </div>

    <script>
      window.__WS_URL__ = "{{WS_URL}}";
    </script>
    <script src="markdown.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
