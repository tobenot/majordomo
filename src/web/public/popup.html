<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>majordomo</title>
    <link rel="icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="card" class="card collapsed">
      <!-- 缩小态徽章：只露头像 + 人设名 -->
      <div class="suppressed-badge" id="suppressedBadge">
        <span class="badge-emoji">🍯</span>
        <span class="badge-name" id="badgeName">中枢</span>
        <span class="badge-dot" id="badgeDot"></span>
      </div>

      <!-- 头部：拖拽区 + 头像 + 标题 + 未读标签 + 连接 -->
      <header id="head">
        <span class="avatar-emoji">🍯</span>
        <img class="logo" id="logo" src="assets/favicon.svg" alt="⌘" />
        <span class="nav-arrow" id="navLeft" title="上一个窗口 (←)">◀</span>
        <span class="proj" id="proj">majordomo</span>
        <span class="nav-arrow" id="navRight" title="下一个窗口 (→)">▶</span>
        <span class="more" id="more" style="display:none"></span>
        <span class="chat-toggle" id="btnChat" title="直接和人设聊聊">💬</span>
        <span class="spacer"></span>
        <span class="time" id="time"></span>
        <span class="conn" id="conn" title="与中枢的连接"></span>
        <button id="btnMin" class="btn-min" title="缩小弹窗（不再自动弹出）">−</button>
      </header>

      <!-- 列表视图 -->
      <div id="listWrap" class="list-wrap">
        <div id="windowList"></div>
      </div>

      <!-- 详情视图 -->
      <div id="detailWrap" class="detail-wrap" style="display:none">
        <!-- CG 横幅 16:9 -->
        <div class="cg-banner" id="cgBanner">
          <img class="cg-banner-img" id="cgBannerImg" src="" alt="" />
        </div>

        <!-- persona 全文 -->
        <section class="persona" id="personaWrap">
          <div class="who" id="who">中枢</div>
          <div class="persona-row">
            <div class="standing-col">
              <div class="standing-frame" id="standingFrame">
                <img class="standing" id="standing" src="" alt="" />
              </div>
              <div class="quick-actions" id="quickActions"></div>
            </div>
            <div class="body" id="persona"></div>
          </div>
        </section>

        <!-- 会话度量 -->
        <div class="detail-metrics" id="detailMetrics" style="display:none"></div>

        <!-- 本轮活动 mini 流 -->
        <section class="acts" id="actsWrap">
          <div class="acts-head" id="actsToggle">▶ 本轮活动 <span id="actCount"></span></div>
          <div class="acts-body" id="actsBody"><div id="acts"></div></div>
        </section>

        <!-- 底部按钮 -->
        <footer>
          <button id="btnList" title="返回列表">←</button>
          <button id="btnOk" class="primary">知道了</button>
          <button id="btnCopy">复制</button>
        </footer>
      </div>

      <!-- 聊天视图：跟工作流平行，不进三张表 -->
      <div id="chatWrap" class="chat-wrap" style="display:none">
        <div class="chat-log" id="chatLog"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" class="chat-input" type="text" placeholder="跟人设说点什么…" autocomplete="off" />
          <button type="submit" class="chat-send">发送</button>
        </form>
      </div>
    </div>

    <script>
      window.__WS_URL__ = "{{WS_URL}}";
    </script>
    <script src="markdown.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
